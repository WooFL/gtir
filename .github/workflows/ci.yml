name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # The suite is hermetic — it needs no Ollama (tests inject embed/fetch) and no gitignored
      # artifacts (shader grammars are tested as mappings/metadata, core grammars resolve from the
      # tree-sitter-wasms devDep). Run under bash on every OS so the glob expands consistently —
      # npm's Windows script-shell (cmd) would pass it unexpanded.
      - name: Run tests
        run: node --test test/*.test.mjs
        shell: bash
